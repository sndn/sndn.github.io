<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Image Slider</title>
<script src="https://code.jquery.com/jquery-3.2.1.min.js" integrity="sha256-hwg4gsxgFZhOsEEamdOYGBf13FyQuiTwlAQgxVSNgt4=" crossorigin="anonymous"></script>
<script src="main.js"></script>
<style>
.slider-outer {
	width: 500px;
	height: 300px;
	margin: 40px auto;
	position: relative;
}

.slider-inner {
	position: relative;
}

.slider-inner div {
	position: absolute;
	display: none;
}

.slider-inner div.active {
	display: inline-block;
}

.prev {
	position: absolute;
	left: -10px;
	top: 38%;
}

.next {
	position: absolute;
	right: -10px;
	top: 38%;
}

.fade {
	-webkit-animation-name: fade;
	-webkit-animation-duration: .2s;
	animation-name: fade;
	animation-duration: .2s;
	-webkit-animation-timing-function: ease-in-out; /* Safari 4.0 - 8.0 */
	animation-timing-function: ease-in-out;
}

.bullets_holder {
	position: absolute;
	text-align: center;	
	bottom: 10px;
	background-color: yellow;
	left: 50%;
	transform: translateX(-50%);
}

.bullets {
	display: inline-block;
	width: 12px;
	height: 12px;
	background-color: red;
	margin-right: 5px;
}

.bullets:last-child {
	margin-right: 0;
}

div:before, div:after {
    visibility: hidden;
    display: block;
    font-size: 0;
    content: " ";
    clear: both;
    height: 0;
}

.left {
	float: left;
	background-color: #eeeeee;
	padding: 4px;
	margin-right: 10px;
	display: block;
	width: 220px;
}

.right {
	float: left;
	background-color: #eeeeee;
	padding: 4px;
	display: block;
	width: 250px;
}

@-webkit-keyframes fade {
	from {opacity: .6}
	to {opacity: 1}
}

@keyframes fade {
	from {opacity: .6}
	to {opacity: 1}
}
</style>
</head>
<body>

<div class="slider-outer">
<div class="slider-inner">
	<div><img src="images/image1.jpg"></div>
	<div>
		<video width="100%" height="300" controls>
		<source src="images/Wildog.mp4" type="video/mp4" />
		</video>
	</div>
	<div>
		<span class="left">Lorem ipsum dolor sit amet, consectetuer adipiscing elit. Aenean commodo ligula eget dolor. Aenean massa. Cum sociis natoque penatibus et magnis dis</span>
		<span class="right">Lorem ipsum dolor sit amet, consectetuer adipiscing elit. Aenean commodo ligula eget dolor. Aenean massa. Cum sociis natoque penatibus et magnis dis</span>
	</div>
	<div><img src="images/image4.jpg"></div>
</div>
<img src="images/arrow-left.png" class="prev">
<img src="images/arrow-right.png" class="next">
<div class="bullets_holder"></div>
</div>

</body>
</html>
