<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add or remove input fields dynamically with Jquery</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
<script>
$(document).ready(function() {
	var max_fields      = 10; //maximum input boxes allowed
   
	var x = 1; //initlal text box count
	$(".add_field_button").click(function(e) { 
	e.preventDefault();
	if(x < max_fields) { 
	x++; 
	$(".input_fields_wrap").append('<div><input type="text" name="textbox"/><a href="" class="remove_field">Remove</a></div>');
	}
});
   
	$(".input_fields_wrap").on("click",".remove_field", function(e) {
		e.preventDefault();
		$(this).parent('div').remove();
	});
});
</script>
</head>
<body>
 
<div class="input_fields_wrap">
	<button class="add_field_button">Add More Fields</button>	
	<div><input type="text" name="textbox"></div>
</div>
 
</body>
</html>
