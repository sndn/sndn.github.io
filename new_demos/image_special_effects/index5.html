<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
<meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge"> 
<meta name="viewport" content="width=device-width, initial-scale=1"> 
<title>Hover Effect Ideas</title>

<style>
.container {
	position:relative;
	width:480px;
	height:360px;
}

.border_div {
	position:absolute;
	top: 30px;
	right: 30px;
	bottom: 30px;
	left: 30px;
	border: 1px solid #fff;
	padding:30px;
	transform: scale(0,0);
	transition: transform 0.35s;
}

.container:hover .border_div {
	transform: scale(1,1);
}

.content {
	position:absolute;
	top:110px;
	text-align:center;
	width:100%;	
}

.content h2 {
	padding:0;
	margin:0 0 25px 0;
	transform:translate3d(0, 0, 0);
	transition:transform 0.35s;
}

.container:hover h2 {
	transform:translate3d(0, 20px, 0);
}

.content p {	
	opacity:0;
	transform: scale(0, 0);
	transition:opacity 0.35s, transform 0.35s;
}

.container:hover p {
	opacity:1;
	transform: scale(1, 1);
}

</style>

</head>
<body>

<div class="container">
	<img src="img/12.jpg" />	
	<div class="border_div"></div>
	<div class="content">
	<h2>Warm Oscar</h2>
	<p>Oscar is a decent man. He used to clean porches with pleasure.</p>
	</div>
</div>

</body>
</html>
