<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
<meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge"> 
<meta name="viewport" content="width=device-width, initial-scale=1"> 
<title>Hover Effect Ideas</title>

<style>
.container {
	position:relative;
	width:480px;
	height:360px;
	overflow:hidden;
	background-color:#333;
}

.container div:before {
	position:absolute;
	top: 30px;
	right: 30px;
	bottom: 30px;
	left: 30px;
	content: '';
	opacity: 1;
	transform: scale(0,1);
	transition: opacity 0.35s, transform 0.35s;
	border-top: 1px solid #fff;
	border-bottom: 1px solid #fff;
}

.container div:after {
	position:absolute;
	top: 30px;
	right: 30px;
	bottom: 30px;
	left: 30px;
	content: '';
	opacity: 1;
	transform: scale(1,0);
	transition: opacity 0.35s, transform 0.35s;
	border-right: 1px solid #fff;
	border-left: 1px solid #fff;
}

.container:hover div:before {
	transform: scale(1,1);
}

.container:hover div:after {
	transform: scale(1,1);
}



</style>

</head>
<body>

<div class="container">
	<img src="img/12.jpg" />
	<div></div>
</div>

</body>
</html>
