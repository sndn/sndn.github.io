<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
<meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge"> 
<meta name="viewport" content="width=device-width, initial-scale=1"> 
<title>Hover Effect Ideas</title>

<style>
.container {
	width:480px;
	height:360px;
	position:relative;
	overflow:hidden;
}

.container img {
	transform:scale(1.15);
	transition:transform 0.35s;
}

.container:hover img {
	transform:scale(1);
}
</style>

</head>
<body>

<div class="container">
	<img src="img/12.jpg" />	
</div>

</body>
</html>
