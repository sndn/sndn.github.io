<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
<meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge"> 
<meta name="viewport" content="width=device-width, initial-scale=1"> 
<title>Hover Effect Ideas</title>

<style>
.container {
	position:relative;
	width:480px;
	height:360px;
}

.container div {
	position:absolute;
	top:30px;
	left:30px;
	right:30px;
	height:1px;
	background:#fff;
	transform-origin: 50% 0;
	transition:transform 0.35s ease-in-out;
}

.container:hover div {
	transform: scale(1,65);
}
</style>

</head>
<body>

<div class="container">
	<img src="img/12.jpg" />
	<div>
	</div>
</div>

</body>
</html>
