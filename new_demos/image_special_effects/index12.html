<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
<meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge"> 
<meta name="viewport" content="width=device-width, initial-scale=1"> 
<title>Hover Effect Ideas</title>

<style>
.container {
	position:relative;
	width:480px;
	height:360px;
	overflow:hidden;
}

.container img {
	transform: scale3d(1,1,1);
	transition:transform 0.35s;
}

.container:hover img {
	transform: scale3d(1.1,1.1,1);
}

.container div {
	position:absolute;
	top:0;
	left:0;
	width:100%;
	height:100%;
	box-sizing: border-box;
	padding:20px;
}

.container div p:first-of-type {
	background-color:#fff;
	padding:6px;
	width:50%;
	opacity:0;
	transform:translate3d(-260px, 0, 0);
	transition:opacity 0.35s, transform 0.35s;
	transition-delay: 0.15s;
}

.container div:hover p:first-of-type {
	opacity:1;
	transform:translate3d(0, 0, 0);
	transition-delay: 0s;
}

.container div p:nth-of-type(2) {
	background-color:#fff;
	padding:6px;
	width:50%;
	opacity:0;
	transform:translate3d(-260px, 0, 0);
	transition:opacity 0.35s, transform 0.35s;
	transition-delay: 0.1s;
}

.container div:hover p:nth-of-type(2) {
	opacity:1;
	transform:translate3d(0, 0, 0);
	transition-delay: 0.05s;
}

.container div p:nth-of-type(3) {
	background-color:#fff;
	padding:6px;
	width:50%;
	opacity:0;
	transform:translate3d(-260px, 0, 0);
	transition:opacity 0.35s, transform 0.35s;
	transition-delay: 0.05s;
}

.container div:hover p:nth-of-type(3) {
	opacity:1;
	transform:translate3d(0, 0, 0);
	transition-delay: 0.01s;
}
</style>

</head>
<body>

<div class="container">
	<img src="img/12.jpg" />
	<div>
		<h2>Passionate Julia</h2>
		<p>Julia dances in the deep dark</p>
		<p>She loves the smell of the ocean</p>
		<p>And dives into the morning light</p>
	</div>
</div>

</body>
</html>
