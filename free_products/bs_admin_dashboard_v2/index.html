<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bootstrap Sidebar Extension Example</title>
<link rel="stylesheet" href="http://netdna.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css">
<link href="css/simple-sidebar.css" rel="stylesheet">
<script src="http://code.jquery.com/jquery-2.2.0.min.js"></script>
<script src="https://use.fontawesome.com/246ad203e0.js"></script>
</head>
<body>

<script>
$(document).ready(function() {
$("li.notification a, li.profile a").click(function(e) {
e.preventDefault();
});

$("li.notification").click(function(){
$("li.notification").children("ul").slideToggle();
});

$("li.profile").click(function(){
$("li.profile").children("ul").slideToggle();
});

$(".sidebar_nav ul li a").click(function(e) {
e.preventDefault();
$(this).parent("li").children("ul").slideToggle("fast");
	//$(".ddicon").toggleClass("rotate");
	//$("this > .ddicon").toggleClass("rotate");
	$(this).find(".ddicon").toggleClass("rotate");
});

$(".sidebar_nav ul li ul").parent().children("a").append('<span class="ddicon"></span>');

$(".menu-toggle").click(function(e) {
e.preventDefault();
$(".sidebar").toggleClass("slide_sidebar");
$(".wrapper").toggleClass("slide_wrapper")
e.stopPropagation();
});

// $(".ddicon").click(function(){
// $(this).toggleClass("rotate"); 
// })

});
</script>

		</div>
		<div class="sidebar_nav">
			<ul>
				<li><a href=""><span class="sn_icon"><img src="images/graph.svg"></span><span class="sn_txt">DASHBOARD</span></a>

				</li>

				<ul>

				</ul>
				</li>

				<li><a href=""><span class="sn_icon"><img src="images/graph.svg"></span><span class="sn_txt">TABLES</span></a></li>

	<div class="main">
	<div class="container-fluid">
		<div class="row">

			<div class="left_top_nav">
			<span class="circle"><img src="images/circle.jpg"></span>
